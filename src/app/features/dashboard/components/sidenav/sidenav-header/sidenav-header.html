<div class="flex items-center h-16 border-b border-gray-200"
     [class.px-4]="!collapsed"
     [class.px-2]="collapsed"
     [class.justify-between]="!collapsed"
     [class.justify-center]="collapsed">

  <!-- Menu Title (hidden when collapsed) -->
  @if (!collapsed) {
    <h2 class="text-sm font-medium text-gray-900 uppercase tracking-wider">{{ title }}</h2>
  }

  <!-- Toggle Collapse Button -->
  <app-button
    variant="ghost"
    size="sm"
    [iconOnly]="true"
    [icon]="collapsed ? 'M13 5l7 7-7 7M5 5l7 7-7 7' : 'M11 19l-7-7 7-7m8 14l-7-7 7-7'"
    [ariaLabel]="collapsed ? 'Expandir menú' : 'Colapsar menú'"
    customClasses="hidden lg:inline-flex text-gray-400 hover:text-gray-500 hover:bg-gray-100"
    [attr.title]="collapsed ? 'Expandir menú' : 'Colapsar menú'"
    (clicked)="onToggleCollapse()"
  ></app-button>
</div>
