<section class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
  <h1 class="text-xl font-semibold text-gray-900">Perfil</h1>
  <p class="mt-2 text-sm text-gray-600">Resumen basico de tu cuenta.</p>

  @if (user()) {
    <dl class="mt-4 grid grid-cols-1 gap-3 text-sm text-gray-700 sm:grid-cols-2">
      <div>
        <dt class="font-medium text-gray-500">Nombre</dt>
        <dd>{{ user()?.name || '-' }}</dd>
      </div>
      <div>
        <dt class="font-medium text-gray-500">Email</dt>
        <dd>{{ user()?.email || '-' }}</dd>
      </div>
    </dl>
  }
</section>
