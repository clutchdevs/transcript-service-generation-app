<header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">

      <!-- Left side: Logo and Mobile Menu Button -->
      <div class="flex items-center">
        <!-- Mobile menu button -->
        @if (config.showMobileMenu) {
          <app-button
            variant="ghost"
            size="sm"
            [iconOnly]="true"
            [icon]="isMobileMenuOpen$() ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'"
            [ariaLabel]="isMobileMenuOpen$() ? 'Cerrar menú principal' : 'Abrir menú principal'"
            customClasses="lg:hidden text-gray-400 hover:text-gray-500 hover:bg-gray-100"
            (clicked)="onMobileMenuToggle()"
            aria-controls="mobile-menu"
            [attr.aria-expanded]="isMobileMenuOpen$()"
          ></app-button>
        }

        <!-- Logo/App Name -->
        <div class="ml-4 lg:ml-0">
          <app-logo [appTitle]="config.appTitle || 'TranscriptAI'" size="md"></app-logo>
        </div>
      </div>

      <!-- Right side: User Menu and Actions -->
      <div class="flex items-center space-x-4">
        <!-- User Menu -->
        @if (config.showUserMenu && user) {
          <app-user-menu
            [user]="user"
            [isOpen]="isUserMenuOpen$()"
            (logout)="onLogout()"
            (menuToggle)="onUserMenuToggle()"
            (profileClick)="onProfileClick()"
            (settingsClick)="onSettingsClick()"
          ></app-user-menu>
        }

        <!-- Logout Button (mobile fallback) -->
        @if (!config.showUserMenu || !user) {
          <app-button
            variant="danger"
            size="sm"
            icon="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            iconPosition="left"
            (clicked)="onLogout()"
          >
            <span class="hidden sm:inline">Cerrar sesión</span>
          </app-button>
        }
      </div>
    </div>
  </div>


</header>
